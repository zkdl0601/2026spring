<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI Academic Strategist v5 - Ivory Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --bg2: #ede7d9;
  --card: #faf7f2;
  --card2: #f0ebe0;
  --border: #d6ccb8;
  --border2: #c4b99a;
  --text: #2c2416;
  --text2: #6b5c42;
  --text3: #9c8b72;
  --primary: #c17f3e;
  --primary-light: #e8b87a;
  --primary-bg: rgba(193,127,62,0.1);
  --danger: #b94040;
  --danger-bg: rgba(185,64,64,0.1);
  --success: #3d7a5a;
  --success-bg: rgba(61,122,90,0.1);
  --ai: #6b4e8a;
  --ai-bg: rgba(107,78,138,0.1);
  --shadow: 0 2px 12px rgba(140,110,60,0.12);
  --shadow-lg: 0 8px 32px rgba(140,110,60,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif KR', serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── SIDEBAR ── */
.sidebar {
  width: 400px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 28px 22px;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header-icon {
  width: 40px; height: 40px;
  background: var(--primary);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 1.1rem; font-weight: 700;
  font-family: 'Playfair Display', serif;
}
.sidebar-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--text);
  line-height: 1.2;
}
.sidebar-header small {
  font-size: 0.7rem;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

.form-section {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.form-section-title {
  font-size: 0.7rem;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

label {
  font-size: 0.78rem;
  color: var(--text2);
  font-weight: 600;
  display: block;
  margin-bottom: 4px;
}

input[type="text"], input[type="number"], input[type="date"], select, textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(193,127,62,0.12);
}
select { cursor: pointer; }
textarea { resize: vertical; min-height: 60px; }

.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.off-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.72rem;
  color: var(--primary);
  font-family: 'DM Mono', monospace;
  cursor: pointer;
}
.off-tag:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
.off-days-container { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }

.btn {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Serif KR', serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
.btn-primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 2px 8px rgba(193,127,62,0.3);
}
.btn-primary:hover { background: #a8692a; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(193,127,62,0.35); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #9a3030; }

/* ── MAIN ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
  background: var(--bg);
}

.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.main-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  color: var(--text);
}
.main-header-meta { font-size: 0.75rem; color: var(--text3); font-family: 'DM Mono', monospace; }

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}
.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.4;
  font-family: 'Playfair Display', serif;
  color: var(--primary);
}
.empty-state p { font-size: 0.9rem; line-height: 1.8; }

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: var(--primary);
  transition: width 0.2s;
}
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--border2); }
.card:hover::before { width: 6px; }
.card.blitz::before { background: var(--danger); }
.card.emergency {
  border-color: rgba(185,64,64,0.4);
  animation: pulse-card 2.5s ease-in-out infinite;
}
@keyframes pulse-card {
  0%,100% { box-shadow: 0 2px 12px rgba(185,64,64,0.1); }
  50% { box-shadow: 0 4px 24px rgba(185,64,64,0.25); }
}

.card-badge {
  position: absolute; top: 14px; right: 14px;
  font-size: 0.65rem; font-family: 'DM Mono', monospace;
  padding: 3px 10px; border-radius: 20px; font-weight: 700;
  letter-spacing: 0.5px;
}
.badge-normal { background: var(--primary-bg); color: var(--primary); border: 1px solid rgba(193,127,62,0.3); }
.badge-blitz { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(185,64,64,0.3); }
.badge-emergency { background: var(--danger); color: white; }

.card-type {
  font-size: 0.65rem; font-family: 'DM Mono', monospace;
  color: var(--text3); text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px;
}
.card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
.card-meta { font-size: 0.75rem; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 14px; }

.progress-bar-bg {
  height: 5px; background: var(--bg2); border-radius: 3px; overflow: hidden; margin-bottom: 10px;
}
.progress-bar-fill {
  height: 100%; border-radius: 3px; transition: width 0.5s ease;
}

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.72rem; color: var(--text3); font-family: 'DM Mono', monospace;
}
.readiness-badge {
  font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(30,20,10,0.55);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--card);
  border-radius: 20px;
  width: 96vw; max-width: 1280px;
  height: 92vh;
  display: flex;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(100,70,20,0.25);
  border: 1px solid var(--border);
}

/* LEFT PANEL */
.modal-left {
  flex: 1.5;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.modal-left-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--card2);
  flex-shrink: 0;
}
.modal-subject-row {
  display: flex; align-items: start; justify-content: space-between; margin-bottom: 12px;
}
.modal-subject { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
.modal-subject span {
  font-size: 0.75rem; font-family: 'DM Mono', monospace;
  color: var(--primary); margin-left: 8px; vertical-align: middle;
}

.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.stat-box .val {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem; font-weight: 600; color: var(--primary); display: block;
}
.stat-box .lbl { font-size: 0.65rem; color: var(--text3); margin-top: 2px; }

/* TABS */
.modal-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--card2);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 12px 8px;
  background: none; border: none;
  font-family: 'Noto Serif KR', serif;
  font-size: 0.78rem; font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--card); }
.tab-btn:hover:not(.active) { color: var(--text2); background: var(--bg2); }

.tab-panel { display: none; flex: 1; overflow-y: auto; padding: 20px 24px; }
.tab-panel.active { display: block; }

/* TODAY MISSION */
.today-mission {
  background: linear-gradient(135deg, rgba(193,127,62,0.08), rgba(193,127,62,0.03));
  border: 1px solid rgba(193,127,62,0.3);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
}
.today-mission-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  font-weight: 700; font-size: 0.9rem; color: var(--primary);
}
.today-time-blocks {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.time-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  font-size: 0.75rem;
}
.time-block .time { font-family: 'DM Mono', monospace; color: var(--primary); font-weight: 600; font-size: 0.8rem; }
.time-block .act { color: var(--text2); margin-top: 3px; }

/* SCHEDULE LIST */
.schedule-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  margin-bottom: 6px;
  background: var(--bg2);
  border: 1px solid transparent;
  transition: all 0.2s;
  cursor: pointer;
}
.schedule-item:hover { border-color: var(--border2); background: var(--card2); }
.schedule-item.today { border-color: var(--primary); background: var(--primary-bg); }
.schedule-item.done { opacity: 0.55; }
.schedule-item.done .s-task { text-decoration: line-through; color: var(--text3); }
.schedule-item.off { background: var(--bg); opacity: 0.7; }
.s-date {
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  color: var(--text3); min-width: 80px;
}
.s-today-label {
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  color: var(--primary); font-weight: 700; min-width: 80px;
}
.s-task { flex: 1; font-size: 0.83rem; color: var(--text); }
.s-check { appearance: none; width: 17px; height: 17px; border: 1.5px solid var(--border2); border-radius: 4px; cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.15s; }
.s-check:checked { background: var(--success); border-color: var(--success); }
.s-check:checked::after { content: ''; position: absolute; top: 2px; left: 5px; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }

/* STRATEGY PANEL */
.strategy-section { margin-bottom: 20px; }
.strategy-section h4 { font-size: 0.78rem; font-family: 'DM Mono', monospace; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.strategy-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text2);
}
.strategy-step {
  display: flex; gap: 12px; margin-bottom: 8px; padding: 10px 12px;
  background: var(--card);
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.82rem;
}
.step-num {
  width: 24px; height: 24px;
  background: var(--primary);
  color: white; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
}
.step-body { flex: 1; }
.step-title { font-weight: 700; color: var(--text); margin-bottom: 2px; }
.step-desc { color: var(--text3); font-size: 0.78rem; }

.pomodoro-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-bottom: 12px;
}
.pomo-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
  font-size: 0.7rem;
}
.pomo-block .ptime { font-family: 'DM Mono', monospace; font-weight: 600; color: var(--primary); font-size: 0.85rem; }

/* TIMER */
.timer-display {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 30px 20px;
  text-align: center;
  margin-bottom: 20px;
}
.timer-circle {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: conic-gradient(var(--primary) 0deg, var(--bg2) 0deg);
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  transition: background 0.5s;
}
.timer-inner {
  width: 130px; height: 130px;
  background: var(--card);
  border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.timer-time {
  font-family: 'DM Mono', monospace;
  font-size: 2.2rem; font-weight: 600;
  color: var(--text);
  line-height: 1;
}
.timer-label { font-size: 0.65rem; color: var(--text3); margin-top: 4px; }
.timer-modes { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
.timer-mode-btn {
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  cursor: pointer; color: var(--text2); transition: all 0.2s;
}
.timer-mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.timer-controls { display: flex; gap: 10px; justify-content: center; }
.timer-stat { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.timer-stat-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.timer-stat-item .n { font-family: 'DM Mono', monospace; font-size: 1.4rem; font-weight: 600; color: var(--primary); }
.timer-stat-item .l { font-size: 0.68rem; color: var(--text3); margin-top: 3px; }

/* LOG */
.log-item {
  display: flex; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
}
.log-time { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text3); min-width: 105px; flex-shrink: 0; }
.log-text { color: var(--text2); line-height: 1.5; }
.log-badge {
  font-size: 0.62rem; padding: 2px 7px; border-radius: 10px;
  font-family: 'DM Mono', monospace; font-weight: 700;
  margin-right: 6px;
}
.log-badge.progress { background: var(--success-bg); color: var(--success); }
.log-badge.memo { background: var(--ai-bg); color: var(--ai); }
.log-badge.check { background: var(--primary-bg); color: var(--primary); }
.log-badge.emergency { background: var(--danger-bg); color: var(--danger); }

/* RIGHT: AI CHAT */
.modal-right {
  width: 340px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--card2);
}
.modal-right-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}
.modal-right-header h4 { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.modal-right-header small { font-size: 0.7rem; color: var(--text3); font-family: 'DM Mono', monospace; }

#chat-box {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
}

.bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 0.82rem;
  line-height: 1.6;
  max-width: 92%;
}
.bubble.ai {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--primary);
  color: var(--text);
  align-self: flex-start;
}
.bubble.user {
  background: var(--ai-bg);
  border: 1px solid rgba(107,78,138,0.25);
  border-right: 3px solid var(--ai);
  color: var(--text);
  align-self: flex-end;
}

.chat-input-area {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}

/* MEMO POPUP */
.memo-popup {
  display: none;
  position: fixed; inset: 0;
  z-index: 300;
  background: rgba(30,20,10,0.5);
  backdrop-filter: blur(3px);
  align-items: center; justify-content: center;
}
.memo-popup.active { display: flex; }
.memo-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 500px;
  box-shadow: var(--shadow-lg);
}
.memo-box h4 { font-size: 1rem; margin-bottom: 14px; color: var(--text); }
.memo-strategy {
  background: var(--bg2);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
  font-size: 0.82rem;
  line-height: 1.7;
  color: var(--text2);
  border-left: 3px solid var(--primary);
}
.memo-strategy strong { color: var(--primary); }

/* READINESS */
.readiness-ring-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
.readiness-ring {
  width: 90px; height: 90px; flex-shrink: 0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 1.4rem; font-weight: 700;
  position: relative;
}
.readiness-info h4 { font-size: 0.9rem; margin-bottom: 6px; }
.readiness-info p { font-size: 0.8rem; color: var(--text2); line-height: 1.6; }

/* UTILS */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 9px;
  font-size: 0.72rem; color: var(--text2);
  font-family: 'DM Mono', monospace;
}

.divider { height: 1px; background: var(--border); margin: 16px 0; }

.section-label {
  font-size: 0.7rem; font-family: 'DM Mono', monospace;
  color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-header-icon">Ac</div>
    <div>
      <h1>Academic Strategist</h1>
      <small>v5.0 — AI Study Planner</small>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">기본 정보</div>
    <div class="field-group">
      <label>과목명</label>
      <input type="text" id="subject" placeholder="예: 경영학 원론">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>유형</label>
        <select id="task_type">
          <option value="exam">시험 (Exam)</option>
          <option value="assignment">과제 (Assignment)</option>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">

    <!-- LEFT PANEL -->

      <!-- TAB 1: SCHEDULE -->

        <textarea id="user-record" rows="3" placeholder="예: 45페이지 완료, 3단원까지 끝냄" style="margin-bottom:10px;"></textarea>
        <button class="btn btn-primary" style="width:100%;" onclick="updateWithAI()">기록 기반 계획 재설정</button>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let plans = JSON.parse(localStorage.getItem('aca_v5')) || [];
let tempOffDays = [];
let currentId = null;
let currentMemoDate = null;
let timerInterval = null;
let timerSeconds = 25 * 60;
let timerRunning = false;
let timerMode = 'focus'; // focus | short | long
const MODES = { focus: 25*60, short: 5*60, long: 15*60 };
const MODE_LABELS = { focus: '집중 세션', short: '짧은 휴식', long: '긴 휴식' };

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.getElementById('dashboard-date').textContent = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

// ─────────────────────────────────────────────
// OFF DAYS
// ─────────────────────────────────────────────
function addOffDay() {
  const val = document.getElementById('off_day_input').value;
  if (!val || tempOffDays.includes(val)) return;
  tempOffDays.push(val);
  renderOffDays();
}
function removeOffDay(d) {
  tempOffDays = tempOffDays.filter(x => x !== d);
  renderOffDays();
}
function renderOffDays() {
  const c = document.getElementById('off_days_list');
  c.innerHTML = tempOffDays.map(d => `
    <span class="off-tag" onclick="removeOffDay('${d}')">${d} x</span>
  `).join('');
}

// ─────────────────────────────────────────────
// ADD PLAN
// ─────────────────────────────────────────────
function addPlan() {
  const subject = document.getElementById('subject').value.trim();
  const deadline = document.getElementById('deadline').value;
  const totalUnits = parseInt(document.getElementById('total_units').value);
  const dailyHours = parseFloat(document.getElementById('daily_hours').value) || 3;
  if (!subject || !deadline || !totalUnits) return alert('필수 정보를 모두 입력해주세요.');

  const plan = {
    id: Date.now(),
    subject, deadline, totalUnits,
    completedUnit: 0,
    taskType: document.getElementById('task_type').value,
    difficulty: document.getElementById('difficulty').value,
    style: document.getElementById('style').value,
    dailyHours,
    examRange: document.getElementById('exam_range').value,
    examInfo: document.getElementById('exam_info').value,
    offDays: [...tempOffDays],
    isEmergency: false,
    dailySchedule: generateSchedule(deadline, [...tempOffDays], totalUnits, 0),
    chatHistory: [],
    activityLog: [],
    memos: {},
    pomodoroCount: 0,
    pomodoroDate: ''
  };
  plans.push(plan);
  tempOffDays = [];
  renderOffDays();
  ['subject','total_units','exam_range','exam_info','off_day_input'].forEach(id => document.getElementById(id).value = '');
  addLog(plan, 'check', `과목 [${plan.subject}] 등록 완료. 총 ${totalUnits}분량, 마감: ${deadline}`);
  save();
}

// ─────────────────────────────────────────────
// SCHEDULE GENERATION
// ─────────────────────────────────────────────
function generateSchedule(deadline, offDays, totalAmount, startUnit) {
  const todayStr = todayISO();
  const end = new Date(deadline);
  let studyDays = [];
  let temp = new Date(); temp.setHours(0,0,0,0);
  while (temp <= end) {
    const d = isoDate(temp);
    if (!offDays.includes(d) && d >= todayStr) studyDays.push(d);
    temp.setDate(temp.getDate() + 1);
  }
  const remaining = totalAmount - startUnit;
  const perDay = Math.ceil(remaining / (studyDays.length || 1));
  let pointer = startUnit;
  let result = [];
  temp = new Date(); temp.setHours(0,0,0,0);
  while (temp <= end) {
    const d = isoDate(temp);
    let task = '';
    if (offDays.includes(d)) { task = '휴식 및 재충전'; }
    else if (d < todayStr) { task = '이전 학습 완료'; }
    else {
      if (pointer < totalAmount) {
        const next = Math.min(pointer + perDay, totalAmount);
        task = `${pointer + 1} ~ ${next} 범위 집중 학습`;
        pointer = next;
      } else { task = '전체 복습 및 문제 풀이'; }
    }
    result.push({ date: d, task, isDone: d < todayStr, isOff: offDays.includes(d) });
    temp.setDate(temp.getDate() + 1);
  }
  return result;
}

// ─────────────────────────────────────────────
// SAVE & RENDER
// ─────────────────────────────────────────────
function save() { localStorage.setItem('aca_v5', JSON.stringify(plans)); render(); }

function getReadiness(p) {
  const pct = p.totalUnits > 0 ? Math.round((p.completedUnit / p.totalUnits) * 100) : 0;
  if (pct >= 90) return { grade: 'A', color: '#3d7a5a', bg: '#d4f0e3' };
  if (pct >= 75) return { grade: 'B', color: '#5a7a3d', bg: '#dff0d4' };
  if (pct >= 55) return { grade: 'C', color: '#8a7a2a', bg: '#f5efc0' };
  if (pct >= 35) return { grade: 'D', color: '#a86030', bg: '#f5dcc0' };
  return { grade: 'F', color: '#b94040', bg: '#f5d0d0' };
}

function render() {
  const db = document.getElementById('dashboard');
  if (plans.length === 0) {
    db.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">Ac</div><p>아직 등록된 과목이 없습니다.<br>왼쪽 폼에서 과목을 추가해보세요.</p></div>`;
    document.getElementById('dashboard-meta').textContent = '과목을 추가하면 카드가 나타납니다';
    return;
  }
  document.getElementById('dashboard-meta').textContent = `총 ${plans.length}개 과목 관리 중`;
  db.innerHTML = '';
  plans.forEach(p => {
    const diff = Math.ceil((new Date(p.deadline) - new Date()) / (1000*60*60*24));
    const pct = p.totalUnits > 0 ? Math.round((p.completedUnit / p.totalUnits) * 100) : 0;
    const isBlitz = p.style === 'blitz';
    const isEmerg = diff <= 3 || p.isEmergency;
    const r = getReadiness(p);
    const fillColor = isBlitz ? 'var(--danger)' : 'var(--primary)';
    const todaySched = p.dailySchedule.find(s => s.date === todayISO());

    const card = document.createElement('div');
    card.className = `card ${isBlitz ? 'blitz' : ''} ${isEmerg ? 'emergency' : ''}`;
    card.onclick = () => openModal(p.id);
    card.innerHTML = `
      <div class="card-badge ${isEmerg ? 'badge-emergency' : isBlitz ? 'badge-blitz' : 'badge-normal'}">
        ${isEmerg ? '비상 상황' : isBlitz ? '벼락치기' : '차근차근'}
      </div>
      <div class="card-type">${p.taskType.toUpperCase()} — ${p.difficulty === 'high' ? '난이도 상' : p.difficulty === 'mid' ? '난이도 중' : '난이도 하'}</div>
      <h3>${p.subject}</h3>
      <div class="card-meta">D-${diff < 0 ? 'Pass' : diff} | ${p.completedUnit}/${p.totalUnits} | ${p.dailyHours}h/day</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%; background:${fillColor};"></div>
      </div>
      <div class="card-footer">
        <span>${pct}% 완료</span>
        <span class="readiness-badge" style="background:${r.bg}; color:${r.color};">준비도 ${r.grade}</span>
      </div>
      ${todaySched && !todaySched.isOff ? `<div style="margin-top:10px; padding:8px 10px; background:var(--bg2); border-radius:8px; font-size:0.73rem; color:var(--text2); border-left:3px solid var(--primary);">오늘: ${todaySched.task}</div>` : ''}
    `;
    db.appendChild(card);
  });
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(id) {
  currentId = id;
  const plan = plans.find(p => p.id === id);
  renderModalHeader(plan);
  switchTab(0);
  renderChat(plan);
  document.getElementById('modalOverlay').classList.add('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  stopTimer();
}

function renderModalHeader(plan) {
  const diff = Math.ceil((new Date(plan.deadline) - new Date()) / (1000*60*60*24));
  const pct = plan.totalUnits > 0 ? Math.round((plan.completedUnit / plan.totalUnits) * 100) : 0;
  const r = getReadiness(plan);
  const pomosToday = getTodayPomos(plan);
  const doneToday = plan.dailySchedule.filter(s => s.isDone && s.date === todayISO()).length;
  const studyDays = plan.dailySchedule.filter(s => !s.isOff).length;

  document.getElementById('modal-header').innerHTML = `
    <div class="modal-subject-row">
      <div>
        <div class="modal-subject">${plan.subject} <span>${plan.style === 'blitz' ? '벼락치기' : '차근차근'}</span></div>
        <div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;">
          <span class="chip">${plan.taskType.toUpperCase()}</span>
          <span class="chip">난이도 ${plan.difficulty === 'high' ? '상' : plan.difficulty === 'mid' ? '중' : '하'}</span>
          <span class="chip">${plan.dailyHours}h/day</span>
          <span class="chip">D-${diff < 0 ? 'Pass' : diff}</span>
        </div>
      </div>
      <button class="btn btn-danger" onclick="deletePlan(${plan.id})" style="padding:8px 14px; font-size:0.78rem;">삭제</button>
    </div>
    <div class="stats-row" style="margin-top:14px;">
      <div class="stat-box">
        <span class="val">${pct}%</span>
        <div class="lbl">전체 진도율</div>
      </div>
      <div class="stat-box">
        <span class="val" style="color:${r.color};">${r.grade}</span>
        <div class="lbl">준비도 등급</div>
      </div>
      <div class="stat-box">
        <span class="val">${pomosToday}</span>
        <div class="lbl">오늘 포모도로</div>
      </div>
      <div class="stat-box">
        <span class="val">${studyDays}</span>
        <div class="lbl">총 학습일수</div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
  const plan = plans.find(p => p.id === currentId);
  if (!plan) return;
  if (idx === 0) renderTabToday(plan);
  if (idx === 1) renderTabSchedule(plan);
  if (idx === 2) renderTabStrategy(plan);
  if (idx === 3) renderTabTimer(plan);
  if (idx === 4) renderTabLog(plan);
}

// TAB 0: TODAY
function renderTabToday(plan) {
  const s = plan.dailySchedule.find(d => d.date === todayISO());
  const pct = plan.totalUnits > 0 ? Math.round((plan.completedUnit / plan.totalUnits) * 100) : 0;
  const r = getReadiness(plan);
  const dailyPages = Math.ceil((plan.totalUnits - plan.completedUnit) / Math.max(plan.dailySchedule.filter(x => !x.isOff && x.date >= todayISO()).length, 1));
  const pomos = Math.ceil(dailyPages / 10);
  const hours = plan.dailyHours;

  const timeBlocks = buildTimeBlocks(hours, pomos);
  const readinessDesc = {
    A: '탁월한 준비 상태입니다. 이 페이스라면 자신 있게 시험에 임할 수 있습니다.',
    B: '양호한 상태입니다. 약한 단원을 집중 점검하면 A 등급을 노릴 수 있습니다.',
    C: '보통 수준입니다. 오늘부터 집중력을 높여야 합니다.',
    D: '위험 신호입니다. 학습 페이스를 올려야 마감을 맞출 수 있습니다.',
    F: '비상 상황입니다. 모든 다른 활동을 최소화하고 집중하세요.'
  };

  document.getElementById('tab-0').innerHTML = `
    <div class="today-mission">
      <div class="today-mission-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        오늘의 미션 — ${todayISO()}
      </div>
      <div style="font-size:0.85rem; color:var(--text2); margin-bottom:14px; padding:10px 12px; background:var(--card); border-radius:8px; border-left:3px solid var(--primary);">
        ${s ? s.task : '오늘 일정이 없습니다.'}
      </div>
      <div class="today-time-blocks">
        ${timeBlocks.map(b => `<div class="time-block"><div class="time">${b.time}</div><div class="act">${b.act}</div></div>`).join('')}
      </div>
    </div>

    <div class="readiness-ring-wrap">
      <div class="readiness-ring" style="background: conic-gradient(${r.color} ${pct * 3.6}deg, var(--bg2) 0deg); font-size:1.3rem; color:${r.color};">
        <div style="width:70px;height:70px;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:${r.color};">${r.grade}</div>
      </div>
      <div class="readiness-info">
        <h4 style="color:${r.color};">준비도 ${r.grade} 등급 (${pct}%)</h4>
        <p>${readinessDesc[r.grade]}</p>
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-label">오늘의 목표 세부 정보</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div style="background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px;">
        <div style="font-size:0.7rem; color:var(--text3); margin-bottom:4px;">오늘 목표 분량</div>
        <div style="font-family:'DM Mono',monospace; font-size:1.2rem; color:var(--primary); font-weight:600;">${dailyPages} 페이지</div>
      </div>
      <div style="background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px;">
        <div style="font-size:0.7rem; color:var(--text3); margin-bottom:4px;">권장 포모도로</div>
        <div style="font-family:'DM Mono',monospace; font-size:1.2rem; color:var(--ai); font-weight:600;">${pomos} 세션</div>
      </div>
      <div style="background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px;">
        <div style="font-size:0.7rem; color:var(--text3); margin-bottom:4px;">총 공부 시간</div>
        <div style="font-family:'DM Mono',monospace; font-size:1.2rem; color:var(--success); font-weight:600;">${hours}시간</div>
      </div>
      <div style="background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px;">
        <div style="font-size:0.7rem; color:var(--text3); margin-bottom:4px;">시험 범위</div>
        <div style="font-size:0.78rem; color:var(--text2);">${plan.examRange || '미지정'}</div>
      </div>
    </div>
    ${plan.examInfo ? `<div style="margin-top:12px; padding:12px; background:var(--ai-bg); border:1px solid rgba(107,78,138,0.2); border-radius:10px; font-size:0.8rem; color:var(--text2); border-left:3px solid var(--ai);">
      <strong style="color:var(--ai);">시험 팁:</strong> ${plan.examInfo}
    </div>` : ''}
  `;
}

function buildTimeBlocks(hours, pomos) {
  const blocks = [];
  let h = 9;
  for (let i = 0; i < Math.min(pomos, 6); i++) {
    blocks.push({ time: `${String(h).padStart(2,'0')}:00`, act: '집중 학습' });
    h++;
    if ((i + 1) % 4 === 0) { blocks.push({ time: `${String(h).padStart(2,'0')}:00`, act: '긴 휴식' }); h++; }
    else if (i < pomos - 1) { blocks.push({ time: `${String(h).padStart(2,'0')}:00`, act: '짧은 휴식' }); }
  }
  return blocks.slice(0, 6);
}

// TAB 1: SCHEDULE
function renderTabSchedule(plan) {
  const today = todayISO();
  document.getElementById('tab-1').innerHTML = `
    <div class="section-label" style="margin-bottom:12px;">전체 학습 일정 (클릭하면 세부 전략 + 메모)</div>
    ${plan.dailySchedule.map(s => {
      const isToday = s.date === today;
      const memo = plan.memos[s.date];
      return `<div class="schedule-item ${isToday ? 'today' : ''} ${s.isDone ? 'done' : ''} ${s.isOff ? 'off' : ''}"
          onclick="${s.isOff ? '' : `openMemo('${s.date}')`}">
        ${isToday ? `<span class="s-today-label">오늘</span>` : `<span class="s-date">${s.date}</span>`}
        <span class="s-task">${s.task}${memo ? ` — ${memo.slice(0,20)}...` : ''}</span>
        ${!s.isOff ? `<input type="checkbox" class="s-check" ${s.isDone ? 'checked' : ''} onclick="event.stopPropagation(); toggleTask('${s.date}')">` : ''}
      </div>`;
    }).join('')}
  `;
}

// TAB 2: STRATEGY
function renderTabStrategy(plan) {
  const diff = plan.difficulty;
  const strategies = {
    low: [
      { title: '빠른 전체 훑기', desc: '먼저 전체 목차와 소제목을 15분 안에 파악합니다.' },
      { title: '핵심 키워드 추출', desc: '각 단원에서 굵은 글씨, 표, 그래프를 중점 정리합니다.' },
      { title: '반복 복습', desc: '같은 내용을 3회 이상 반복하면 장기기억으로 전환됩니다.' },
      { title: '문제 풀이 중심', desc: '기출 및 연습문제를 풀며 개념을 검증합니다.' },
    ],
    mid: [
      { title: '구조화 노트 작성', desc: '마인드맵이나 개요 형태로 단원별 흐름을 정리합니다.' },
      { title: '능동적 회상', desc: '책을 닫고 방금 읽은 내용을 스스로 떠올려 말해봅니다.' },
      { title: '오답 분석', desc: '틀린 문제는 반드시 원인을 파악하고 3회 재학습합니다.' },
      { title: '교차 학습', desc: '한 과목만 장시간 하지 말고 단원 단위로 교차하며 공부합니다.' },
    ],
    high: [
      { title: '파인만 기법', desc: '모르는 개념을 초등학생에게 설명하듯 쉽게 서술해봅니다.' },
      { title: '분산 학습', desc: '한 번에 몰아서 하지 말고 2~3일에 걸쳐 분산합니다.' },
      { title: '정교화 질문법', desc: '"왜 이렇게 되는가?"를 스스로 묻고 답하며 깊이 이해합니다.' },
      { title: '스트레스 관리', desc: '수면 7시간, 수분 섭취, 10분 산책을 반드시 지킵니다.' },
    ]
  };
  const stList = strategies[diff] || strategies.mid;
  const dailyPomos = Math.ceil(plan.dailyHours * 60 / 25);

  document.getElementById('tab-2').innerHTML = `
    <div class="strategy-section">
      <h4>학습 전략 — 난이도 ${diff === 'high' ? '상 (어려움)' : diff === 'mid' ? '중 (보통)' : '하 (쉬움)'}</h4>
      ${stList.map((s, i) => `
        <div class="strategy-step">
          <div class="step-num">${i + 1}</div>
          <div class="step-body">
            <div class="step-title">${s.title}</div>
            <div class="step-desc">${s.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="divider"></div>
    <div class="strategy-section">
      <h4>포모도로 배분 가이드 (하루 ${plan.dailyHours}h 기준)</h4>
      <div class="pomodoro-grid">
        ${Array.from({length: Math.min(dailyPomos, 8)}, (_, i) => `
          <div class="pomo-block">
            <div class="ptime">${String(Math.floor(i * 30 / 60) + 9).padStart(2,'0')}:00</div>
            <div style="font-size:0.65rem; color:var(--text3); margin-top:3px;">${(i % 4 === 3) ? '긴 휴식' : '집중'}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="divider"></div>
    <div class="strategy-section">
      <h4>집중력 유지 팁</h4>
      <div class="strategy-card">
        <div style="margin-bottom:6px;">- 핸드폰은 반드시 다른 방에 두거나 무음 + 뒤집기</div>
        <div style="margin-bottom:6px;">- 공부 시작 전 책상 정리 (3분 이내)</div>
        <div style="margin-bottom:6px;">- 백색소음 또는 클래식 음악 활용 (가사 없는 음악)</div>
        <div style="margin-bottom:6px;">- 25분 이후 반드시 자리에서 일어나 스트레칭</div>
        <div>- 수분 섭취: 1시간마다 물 한 컵 (뇌 집중력 유지)</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="strategy-section">
      <h4>등록된 시험 정보</h4>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="strategy-card" style="font-size:0.8rem;">
          <strong style="color:var(--primary);">시험 범위</strong><br>
          ${plan.examRange || '미지정'}
        </div>
        <div class="strategy-card" style="font-size:0.8rem;">
          <strong style="color:var(--primary);">시험 팁</strong><br>
          ${plan.examInfo || '미지정'}
        </div>
      </div>
    </div>
  `;
}

// TAB 3: TIMER
function renderTabTimer(plan) {
  document.getElementById('tab-3').innerHTML = `
    <div class="timer-display">
      <div class="timer-modes">
        <button class="timer-mode-btn ${timerMode === 'focus' ? 'active' : ''}" onclick="setTimerMode('focus')">집중 25분</button>
        <button class="timer-mode-btn ${timerMode === 'short' ? 'active' : ''}" onclick="setTimerMode('short')">짧은 5분</button>
        <button class="timer-mode-btn ${timerMode === 'long' ? 'active' : ''}" onclick="setTimerMode('long')">긴 15분</button>
      </div>
      <div class="timer-circle" id="timer-circle">
        <div class="timer-inner">
          <div class="timer-time" id="timer-display">${formatTime(timerSeconds)}</div>
          <div class="timer-label" id="timer-label">${MODE_LABELS[timerMode]}</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="btn btn-primary" onclick="toggleTimer()" id="timer-start-btn">시작</button>
        <button class="btn btn-ghost" onclick="resetTimer()">초기화</button>
      </div>
      <div class="timer-stat">
        <div class="timer-stat-item">
          <div class="n" id="pomo-today-count">${getTodayPomos(plan)}</div>
          <div class="l">오늘 완료 세션</div>
        </div>
        <div class="timer-stat-item">
          <div class="n">${Math.round(getTodayPomos(plan) * 25)}</div>
          <div class="l">오늘 총 집중 시간 (분)</div>
        </div>
      </div>
    </div>
    <div style="background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:0.82rem; color:var(--text2); line-height:1.8;">
      <strong style="color:var(--text);">포모도로 기법이란?</strong><br>
      25분 집중 + 5분 휴식을 1세트로 반복합니다. 4세트 완료 후 15분 긴 휴식을 취합니다. 집중력을 극대화하고 번아웃을 방지하는 검증된 시간 관리 기법입니다.
    </div>
  `;
}

// TAB 4: LOG
function renderTabLog(plan) {
  const logs = plan.activityLog || [];
  document.getElementById('tab-4').innerHTML = `
    <div class="section-label" style="margin-bottom:12px;">학습 활동 기록 (${logs.length}건)</div>
    ${logs.length === 0 ? `<div style="text-align:center; padding:40px; color:var(--text3); font-size:0.85rem;">아직 기록이 없습니다.</div>` : ''}
    ${[...logs].reverse().map(l => `
      <div class="log-item">
        <div class="log-time">${l.time}</div>
        <div class="log-text"><span class="log-badge ${l.type}">${l.type === 'progress' ? '진도' : l.type === 'memo' ? '메모' : l.type === 'emergency' ? '비상' : '체크'}</span>${l.text}</div>
      </div>
    `).join('')}
  `;
}

// ─────────────────────────────────────────────
// TIMER LOGIC
// ─────────────────────────────────────────────
function setTimerMode(mode) {
  stopTimer();
  timerMode = mode;
  timerSeconds = MODES[mode];
  updateTimerDisplay();
  renderTabTimer(plans.find(p => p.id === currentId));
}
function toggleTimer() {
  if (timerRunning) stopTimer();
  else startTimer();
}
function startTimer() {
  timerRunning = true;
  document.getElementById('timer-start-btn').textContent = '일시정지';
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) {
      timerSeconds = 0;
      stopTimer();
      if (timerMode === 'focus') {
        const plan = plans.find(p => p.id === currentId);
        const today = todayISO();
        if (plan.pomodoroDate !== today) { plan.pomodoroCount = 0; plan.pomodoroDate = today; }
        plan.pomodoroCount++;
        addLog(plan, 'check', `포모도로 세션 완료 (${plan.pomodoroCount}번째)`);
        save();
        document.getElementById('pomo-today-count').textContent = plan.pomodoroCount;
      }
      alert(timerMode === 'focus' ? '25분 집중 완료! 5분 휴식하세요.' : '휴식 끝! 다시 집중합시다.');
    }
    updateTimerDisplay();
  }, 1000);
}
function stopTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  const btn = document.getElementById('timer-start-btn');
  if (btn) btn.textContent = '시작';
}
function resetTimer() {
  stopTimer();
  timerSeconds = MODES[timerMode];
  updateTimerDisplay();
}
function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  const circle = document.getElementById('timer-circle');
  if (el) el.textContent = formatTime(timerSeconds);
  if (circle) {
    const total = MODES[timerMode];
    const pct = (1 - timerSeconds / total) * 360;
    circle.style.background = `conic-gradient(var(--primary) ${pct}deg, var(--bg2) 0deg)`;
  }
}
function formatTime(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function getTodayPomos(plan) {
  const today = todayISO();
  if (plan.pomodoroDate === today) return plan.pomodoroCount || 0;
  return 0;
}

// ─────────────────────────────────────────────
// MEMO / STRATEGY POPUP
// ─────────────────────────────────────────────
function openMemo(date) {
  currentMemoDate = date;
  const plan = plans.find(p => p.id === currentId);
  const s = plan.dailySchedule.find(x => x.date === date);
  const diff = plan.difficulty;
  const strategyText = {
    low: `<strong>난이도 하</strong> 전략<br>이 날은 가볍게 훑어보는 것이 목표입니다. 핵심 용어를 형광펜으로 표시하고, 목차를 먼저 파악하세요. 연습문제는 빠르게 1회독합니다.`,
    mid: `<strong>난이도 중</strong> 전략<br>구조화된 노트를 작성하세요. 단원별로 3~5개의 핵심 개념을 추출하고, 책을 닫은 후 능동적으로 회상하는 연습을 합니다.`,
    high: `<strong>난이도 상</strong> 전략<br>파인만 기법을 활용하세요. 각 개념을 자신만의 언어로 설명해보고, 왜 그렇게 되는지 인과관계를 파악합니다. 오답 분석을 철저히 합니다.`
  };
  const pomos = Math.ceil((plan.totalUnits / plan.dailySchedule.filter(x=>!x.isOff).length) / 10);
  document.getElementById('memo-popup-title').textContent = `${date} 세부 전략`;
  document.getElementById('memo-strategy-content').innerHTML = `
    ${strategyText[diff]}<br><br>
    <strong>오늘의 임무:</strong> ${s ? s.task : '-'}<br>
    <strong>권장 포모도로:</strong> ${pomos}세션 (약 ${pomos * 25}분)<br>
    <strong>학습 팁:</strong> 시작 전 5분 브레인 덤프 — 지금 아는 것을 모두 종이에 적어보세요.
  `;
  document.getElementById('memo-text-input').value = plan.memos[date] || '';
  document.getElementById('memoPopup').classList.add('active');
}
function closeMemo() {
  document.getElementById('memoPopup').classList.remove('active');
  currentMemoDate = null;
}
function saveMemo() {
  const text = document.getElementById('memo-text-input').value.trim();
  const plan = plans.find(p => p.id === currentId);
  if (text) {
    plan.memos[currentMemoDate] = text;
    addLog(plan, 'memo', `${currentMemoDate} 메모 저장: ${text.slice(0, 40)}...`);
  } else {
    delete plan.memos[currentMemoDate];
  }
  save();
  closeMemo();
  switchTab(1);
}

// ─────────────────────────────────────────────
// TASK TOGGLE
// ─────────────────────────────────────────────
function toggleTask(date) {
  const plan = plans.find(p => p.id === currentId);
  const t = plan.dailySchedule.find(s => s.date === date);
  t.isDone = !t.isDone;
  addLog(plan, 'check', `${date} 일정 ${t.isDone ? '완료 체크' : '체크 해제'}`);
  save();
  switchTab(1);
}

// ─────────────────────────────────────────────
// AI UPDATE
// ─────────────────────────────────────────────
function updateWithAI() {
  const record = document.getElementById('user-record').value.trim();
  const matched = record.match(/\d+/);
  if (!matched) return alert('진도 숫자(예: 50페이지)를 포함해주세요!');

  const plan = plans.find(p => p.id === currentId);
  const completed = parseInt(matched[0]);
  const todayIdx = plan.dailySchedule.findIndex(s => s.date === todayISO());
  const recommended = Math.ceil((plan.totalUnits / plan.dailySchedule.length) * (todayIdx + 1));

  plan.completedUnit = completed;
  plan.isEmergency = completed < recommended * 0.7;
  plan.dailySchedule = generateSchedule(plan.deadline, plan.offDays, plan.totalUnits, completed);

  const pct = Math.round((completed / plan.totalUnits) * 100);
  const msg = plan.isEmergency
    ? `진도가 예상보다 많이 뒤처져 비상 모드로 전환됩니다. 현재 ${pct}% 완료 (${completed}/${plan.totalUnits}). 남은 분량을 내일부터 집중적으로 재배분했습니다. 하루 학습량이 늘어났으니 마음의 준비를 하세요.`
    : `현재 ${pct}% 완료 (${completed}/${plan.totalUnits}) — 아주 좋은 페이스입니다! 남은 분량을 효율적으로 재조정했습니다. 이 속도를 유지하면 여유롭게 마감을 맞출 수 있습니다.`;

  plan.chatHistory.push({ role: 'user', text: record }, { role: 'ai', text: msg });
  addLog(plan, plan.isEmergency ? 'emergency' : 'progress', `진도 업데이트: ${completed}/${plan.totalUnits} (${pct}%) — ${plan.isEmergency ? '비상 모드 전환' : '정상 페이스'}`);
  document.getElementById('user-record').value = '';
  save();
  renderModalHeader(plan);
  renderChat(plan);
  switchTab(0);
}

function renderChat(plan) {
  const box = document.getElementById('chat-box');
  box.innerHTML = `<div class="bubble ai">안녕하세요! ${plan.subject} 학습을 도와드리겠습니다. 오른쪽 아래에 오늘 공부한 내용을 입력하면 계획을 자동으로 재조정해드립니다.</div>`;
  plan.chatHistory.slice(-6).forEach(c => {
    const div = document.createElement('div');
    div.className = `bubble ${c.role}`;
    div.textContent = c.text;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

// ─────────────────────────────────────────────
// LOG
// ─────────────────────────────────────────────
function addLog(plan, type, text) {
  if (!plan.activityLog) plan.activityLog = [];
  plan.activityLog.push({
    time: new Date().toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }),
    type, text
  });
}

// ─────────────────────────────────────────────
// DELETE
// ─────────────────────────────────────────────
function deletePlan(id) {
  if (!confirm('정말 삭제할까요?')) return;
  plans = plans.filter(p => p.id !== id);
  save();
  closeModal();
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function todayISO() { return new Date().toISOString().split('T')[0]; }
function isoDate(d) { return d.toISOString().split('T')[0]; }

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Academic Strategist v4.4 - Full Integrated</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card: #1e293b; --primary: #38bdf8; --danger: #ef4444; --ai: #a855f7; --success: #10b981;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
        
        /* 사이드바 */
        .sidebar { width: 420px; background: #0f172a; padding: 25px; overflow-y: auto; border-right: 1px solid #334155; flex-shrink: 0; }
        .form-group { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #020617; background: #0f172a; color: white; box-sizing: border-box; margin-bottom: 10px; }
        
        /* 대시보드 */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }

        /* 카드 스타일 */
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #334155; cursor: pointer; position: relative; transition: 0.3s; overflow: hidden; }
        .card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .card.blitz-mode { border-left: 6px solid var(--danger); }
        .card.emergency { border: 2px solid var(--danger); animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 25px rgba(239, 68, 68, 0.5); }
        }

        .emergency-badge { position: absolute; top: 15px; right: 15px; background: var(--danger); color: white; font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; z-index: 5; }

        /* 모달 레이아웃 */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 1% auto; width: 95%; max-width: 1200px; height: 95vh; border-radius: 20px; display: flex; overflow: hidden; }
        .modal-left { flex: 1.4; padding: 25px; overflow-y: auto; border-right: 1px solid #444; }
        .modal-right { flex: 1; display: flex; flex-direction: column; background: #0f172a; }

        /* 일정 아이템 */
        .schedule-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; transition: 0.3s; border: 1px solid transparent; }
        .schedule-item.done { background: rgba(16, 185, 129, 0.1); opacity: 0.6; }
        .schedule-item.done strong, .schedule-item.done span { text-decoration: line-through; color: #94a3b8; }
        .schedule-item.today { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 10px 15px; border-radius: 12px; max-width: 85%; font-size: 0.9rem; line-height: 1.5; }
        .ai { background: #3b82f61a; border-left: 4px solid var(--primary); align-self: flex-start; }
        .user { background: #a855f71a; border-right: 4px solid var(--ai); align-self: flex-end; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2><i class="fas fa-brain"></i> Academic AI v4</h2>
    <div class="form-group">
        <label>과목명</label><input type="text" id="subject" placeholder="과목명 입력">
        
        <label>유형 선택</label>
        <select id="task_type">
            <option value="exam">시험 (Exam)</option>
            <option value="assignment">과제 (Assignment)</option>
        </select>

        <label>마감일/시험일</label><input type="date" id="deadline">
        
        <label>공부 스타일</label>
        <select id="style">
            <option value="normal">기본 (차근차근)</option>
            <option value="blitz">벼락치기 (빨간색 & 타이트한 일정)</option>
        </select>

        <label>전체 분량 (페이지 또는 단원 수)</label>
        <input type="number" id="total_units" placeholder="숫자만 입력 (예: 200)">

        <label>시험 범위 상세 (기록 유지됨)</label>
        <textarea id="exam_range" placeholder="예: 1~5단원, 연습문제 전체" rows="2"></textarea>

        <label>시험 정보 및 팁 (기록 유지됨)</label>
        <textarea id="exam_info" placeholder="예: 객관식 위주, 오픈북 아님" rows="2"></textarea>

        <label>휴무일 설정</label>
        <input type="date" id="off_day_input">
        <button onclick="addOffDay()" style="width:100%; margin-bottom:5px; background:#334155; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">휴무일 추가</button>
        <div id="off_days_list" style="font-size:0.7rem; color:var(--primary); margin-bottom:10px;"></div>

        <button onclick="addPlan()" style="width:100%; padding:15px; background:var(--primary); font-weight:bold; border-radius:8px; cursor:pointer; color:black; border:none;">전략 리포트 생성</button>
    </div>
</aside>

<main class="main-content">
    <div id="dashboard" class="dashboard-grid"></div>
</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-left" id="modal-info">
            </div>
        <div class="modal-right">
            <div id="chat-box"></div>
            <div style="padding:20px; border-top:1px solid #334155;">
                <label style="color:var(--ai)">학습 기록 업데이트</label>
                <textarea id="user-record" placeholder="오늘 어디까지 공부했나요? (예: 45페이지 완료)" rows="3" style="margin-top:10px;"></textarea>
                <button onclick="updateWithAI()" style="width:100%; background:var(--ai); color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">기록 기반 계획 재설정</button>
            </div>
        </div>
    </div>
</div>

<script>
    let plans = JSON.parse(localStorage.getItem('ai_academic_v4')) || [];
    let tempOffDays = [];
    let currentId = null;

    function addOffDay() {
        const val = document.getElementById('off_day_input').value;
        if(val && !tempOffDays.includes(val)) {
            tempOffDays.push(val);
            document.getElementById('off_days_list').innerText = "휴무: " + tempOffDays.join(', ');
        }
    }

    function addPlan() {
        const subject = document.getElementById('subject').value;
        const deadline = document.getElementById('deadline').value;
        const totalUnits = parseInt(document.getElementById('total_units').value);

        if(!subject || !deadline || !totalUnits) return alert("필수 정보를 모두 입력해주세요.");

        const plan = {
            id: Date.now(),
            subject, deadline, totalUnits,
            completedUnit: 0,
            taskType: document.getElementById('task_type').value,
            style: document.getElementById('style').value,
            examRange: document.getElementById('exam_range').value,
            examInfo: document.getElementById('exam_info').value,
            offDays: [...tempOffDays],
            progress: 0,
            isEmergency: false,
            dailySchedule: generateSchedule(deadline, tempOffDays, totalUnits, 0),
            chatHistory: []
        };
        plans.push(plan);
        tempOffDays = [];
        document.getElementById('off_days_list').innerText = "";
        save();
    }

    function generateSchedule(deadline, offDays, totalAmount, startUnit) {
        let schedule = [];
        let curr = new Date(); curr.setHours(0,0,0,0);
        const end = new Date(deadline);
        const todayStr = new Date().toISOString().split('T')[0];
        
        let studyDays = [];
        let temp = new Date(curr);
        while(temp <= end) {
            const dStr = temp.toISOString().split('T')[0];
            if(!offDays.includes(dStr) && dStr >= todayStr) studyDays.push(dStr);
            temp.setDate(temp.getDate() + 1);
        }

        const remaining = totalAmount - startUnit;
        const perDay = Math.ceil(remaining / (studyDays.length || 1));
        let pointer = startUnit;

        temp = new Date(curr);
        while(temp <= end) {
            const dStr = temp.toISOString().split('T')[0];
            let task = "";
            if (offDays.includes(dStr)) task = "🛋️ 휴식 및 재충전";
            else if (dStr < todayStr) task = "✅ 이전 학습 완료";
            else {
                if (pointer < totalAmount) {
                    let next = Math.min(pointer + perDay, totalAmount);
                    task = `📚 범위: ${pointer + 1} ~ ${next} 집중 학습`;
                    pointer = next;
                } else task = "🔍 전체 복습 및 문제 풀이";
            }
            schedule.push({ date: dStr, task, isDone: dStr < todayStr, isOff: offDays.includes(dStr) });
            temp.setDate(temp.getDate() + 1);
        }
        return schedule;
    }

    function save() {
        localStorage.setItem('ai_academic_v4', JSON.stringify(plans));
        render();
    }

    function render() {
        const db = document.getElementById('dashboard');
        db.innerHTML = '';
        plans.forEach(p => {
            const diff = Math.ceil((new Date(p.deadline) - new Date()) / (1000*60*60*24));
            const card = document.createElement('div');
            const isBlitz = p.style === 'blitz';
            const isEmerg = diff <= 3 || p.isEmergency;

            card.className = `card ${isBlitz ? 'blitz-mode' : ''} ${isEmerg ? 'emergency' : ''}`;
            card.onclick = () => openModal(p.id);
            card.innerHTML = `
                ${isEmerg ? '<div class="emergency-badge">🚨 비상 상황</div>' : ''}
                <span style="font-size:0.7rem; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px;">${p.taskType.toUpperCase()}</span>
                <h3 style="margin: 10px 0 5px 0;">${p.subject}</h3>
                <p style="font-size:0.8rem; color:#94a3b8; margin:0;">D-${diff < 0 ? 'Pass' : diff} | 진도: ${p.completedUnit}/${p.totalUnits}</p>
                <div style="height:6px; background:#020617; border-radius:3px; margin-top:10px;">
                    <div style="width:${(p.completedUnit/p.totalUnits)*100}%; height:100%; background:${isBlitz ? 'var(--danger)' : 'var(--primary)'}; border-radius:3px; transition:0.5s;"></div>
                </div>
            `;
            db.appendChild(card);
        });
    }

    function openModal(id) {
        currentId = id;
        const plan = plans.find(p => p.id === id);
        const info = document.getElementById('modal-info');
        const todayStr = new Date().toISOString().split('T')[0];
        
        // 기존 시험 정보와 범위를 상단에 그대로 유지
        info.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <h2>${plan.subject} <small style="color:var(--primary)">(${plan.style === 'blitz' ? '벼락치기' : '일반'})</small></h2>
                <button onclick="deletePlan(${plan.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">과목 삭제</button>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin:20px 0;">
                <div class="form-group">
                    <label>📍 등록된 시험 범위</label>
                    <div style="font-size:0.9rem; white-space:pre-wrap;">${plan.examRange || '미지정'}</div>
                </div>
                <div class="form-group">
                    <label>📜 등록된 시험 정보</label>
                    <div style="font-size:0.9rem; white-space:pre-wrap;">${plan.examInfo || '미지정'}</div>
                </div>
            </div>

            <h4>📅 AI 실시간 조정 계획</h4>
            <div id="schedule-list">
                ${plan.dailySchedule.map(s => `
                    <div class="schedule-item ${s.date === todayStr ? 'today' : ''} ${s.isDone ? 'done' : ''}" style="display:flex; justify-content:space-between; align-items:center;">
                        <span><strong>${s.date === todayStr ? '⭐ 오늘' : s.date}</strong>: ${s.task}</span>
                        ${!s.isOff ? `<input type="checkbox" ${s.isDone?'checked':''} onchange="toggleTask('${s.date}')">` : ''}
                    </div>
                `).join('')}
            </div>
        `;

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '<div class="bubble ai">학습 기록을 분석하여 왼쪽의 계획표를 실시간으로 재구성합니다.</div>';
        plan.chatHistory.slice(-3).forEach(c => {
            const div = document.createElement('div');
            div.className = `bubble ${c.role}`;
            div.innerText = c.text;
            chatBox.appendChild(div);
        });
        document.getElementById('modal').style.display = "block";
    }

    function toggleTask(date) {
        const plan = plans.find(p => p.id === currentId);
        const t = plan.dailySchedule.find(s => s.date === date);
        t.isDone = !t.isDone;
        save();
        openModal(currentId);
    }

    function updateWithAI() {
        const record = document.getElementById('user-record').value;
        const matched = record.match(/\d+/);
        if(!matched) return alert("진도 숫자(예: 50페이지)를 포함해주세요!");

        const plan = plans.find(p => p.id === currentId);
        const completed = parseInt(matched[0]);
        
        // 권장 진도 대비 비상 여부 체크
        const todayIdx = plan.dailySchedule.findIndex(s => s.date === new Date().toISOString().split('T')[0]);
        const recommended = (plan.totalUnits / plan.dailySchedule.length) * (todayIdx + 1);

        plan.completedUnit = completed;
        plan.isEmergency = completed < recommended; 
        plan.dailySchedule = generateSchedule(plan.deadline, plan.offDays, plan.totalUnits, completed);

        const msg = plan.isEmergency 
            ? `⚠️ 진도가 지연되어 비상 모드로 전환합니다. 남은 분량을 내일부터 타이트하게 재분배했습니다.`
            : `✅ 아주 좋습니다! 남은 분량을 효율적으로 다시 쪼개어 계획표에 반영했습니다.`;

        plan.chatHistory.push({role:'user', text: record}, {role:'ai', text: msg});
        document.getElementById('user-record').value = '';
        save();
        openModal(currentId); 
    }

    function deletePlan(id) { if(confirm("정말 삭제할까요?")) { plans = plans.filter(p=>p.id!==id); save(); document.getElementById('modal').style.display="none"; } }
    window.onclick = e => { if(e.target.className === 'modal') e.target.style.display="none"; }
    render();
</script>
</body>
</html>
